<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md bg-white rounded-xl shadow p-8">

    <div class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-slate-800">
            Sistema de Agua
        </h1>
        <p class="text-sm text-gray-500">
            Iniciar sesión
        </p>
    </div>

    {% if form.errors %}
        <div class="bg-red-100 text-red-700 px-4 py-3 rounded mb-5 text-sm">
            Usuario o contraseña incorrectos.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">
                Usuario
            </label>

            <input
                type="text"
                name="username"
                autofocus
                required
                class="w-full px-4 py-2 border rounded-lg"
            >
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-1">
                Contraseña
            </label>

            <input
                type="password"
                name="password"
                required
                class="w-full px-4 py-2 border rounded-lg"
            >
        </div>

        <button
            type="submit"
            class="w-full bg-slate-900 text-white py-2 rounded-lg hover:bg-slate-700">
            Ingresar
        </button>
    </form>

</div>

</body>
</html>
