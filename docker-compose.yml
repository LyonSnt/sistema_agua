services:
  web:
    build: .
    container_name: sistema_agua_web
    restart: unless-stopped
    command: >
      sh -c "
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8015
      "
    volumes:
      - ./app:/app
    ports:
      - "8015:8015"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: sistema_agua_db
    restart: always
    environment:
      POSTGRES_DB: sistema_agua
      POSTGRES_USER: sistema_agua_user
      POSTGRES_PASSWORD: sistema_agua_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5445:5432"

volumes:
  postgres_data: