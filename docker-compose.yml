services:
  web:
    build: .
    container_name: sistema_agua_web
    restart: unless-stopped
    command: >
      sh -c "
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      gunicorn configuracion.wsgi:application --bind 0.0.0.0:8015
      "
    ports:
      - "8015:8015"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: sistema_agua_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
